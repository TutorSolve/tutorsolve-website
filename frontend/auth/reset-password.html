<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TutorSolve</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>

<body class="auth-body">
  <div class="auth-layout">
    <div class="auth-brand">
      <img src="/assets/logo.svg" alt="TutorSolve" width="48">
      <h2>TutorSolve</h2>
      <p>Set a new password for your account.</p>
    </div>
    <div class="auth-form-panel">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Create a new password from your email reset link.</p>

      <div class="form-group">
        <label class="label">Email</label>
        <input id="email" type="email" class="input" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="label">New Password</label>
        <div class="password-wrapper">
          <input id="new-password" type="password" class="input" placeholder="Min. 8 characters">
          <button class="password-toggle" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="label">Confirm Password</label>
        <div class="password-wrapper">
          <input id="confirm-password" type="password" class="input" placeholder="Repeat new password">
          <button class="password-toggle" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <button id="reset-btn" class="btn btn-primary btn-lg" style="width:100%">Reset Password</button>
      <p class="auth-footer">
        Remembered it? <a href="/auth/login.html">Back to Log In</a>
      </p>
    </div>
  </div>

  <script src="/js/runtime-env.js"></script>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const emailFromLink = params.get("email") || "";

    const emailInput = document.getElementById("email");
    emailInput.value = emailFromLink;

    document.getElementById("reset-btn").addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const newPassword = document.getElementById("new-password").value;
      const confirmPassword = document.getElementById("confirm-password").value;
      const btn = document.getElementById("reset-btn");

      if (!token) {
        toast("Invalid reset link. Request a new one.", "error");
        return;
      }
      if (!email || !newPassword || !confirmPassword) {
        toast("All fields are required.", "error");
        return;
      }
      if (newPassword.length < 8) {
        toast("Password must be at least 8 characters.", "error");
        return;
      }
      if (newPassword !== confirmPassword) {
        toast("Passwords do not match.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Resetting...";
      try {
        const data = await resetPassword(email, token, newPassword, confirmPassword);
        toast(data.message || "Password reset successfully.", "success");
        setTimeout(() => {
          window.location.href = "/auth/login.html";
        }, 1400);
      } catch (err) {
        toast(err.message || "Unable to reset password.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Reset Password";
      }
    });
  </script>
</body>

</html>
